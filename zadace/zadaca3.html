        align-items: center;

    }

    }

    }
    .toprated:hover{

    .search{

        display: flex;

        justify-content: flex-start;
        padding-left: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        

        }
    .search:hover{
        background-color: #5C3E94;
    }    

    .container {
    display: flex;
    gap: 50px;
    margin-top: 50px;
    justify-content: center;
    margin-top: 100px;
    margin-left: 30px;
}

.breakingbad, .chernobyl {
    width: 330px;
    height: 480px;
    text-align: center;
    font-size: 24px;
    color: #9929EA;
    transition: transform 0.3s ease, color 0.3s ease;
}

.breakingbad:hover {
    transform: scale(1.1);
    color: #1ABC9C;
}

.chernobyl:hover {
    transform: scale(1.1);
    color: #556B2F;
}

.breakingbad img, .chernobyl img {
    width: 330px;
    height: 480px;
    display: block;
    margin: 5px;
}
</style>
<body>
    <div class="upperrow">Stranica</div>
    <div class="movies">Movies</div>

    <div class="search">search...</div>
    <input class="search" type="text" placeholder="search...">


    <div class="container">

</div>
