<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zad4</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #ddd;
}

.container {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px;
}

.blue { background: #4f83c2; height: 70px; }

.box {
  width: 100%;
}

/* GRUPE - MOBILE (320px) */
.blue-group{
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* TABLET (>=768px) */
@media (min-width: 768px) {

  .blue-group {
    flex-direction: row;
    flex-wrap: wrap;
  }

  .blue-group .box {
    width: calc(50% - 5px);
  }

}

/* DESKTOP (>=1024px) */
@media (min-width: 1024px) {

  

  .blue-group {
    flex-direction: row;
  }

  .blue-group .box {
    width: calc(33.33% - 7px);
  }

}
</style>

</head>
<body>

<div class="container">


  <div class="blue-group">
    <div class="box blue"></div>
    <div class="box blue"></div>
    <div class="box blue"></div>
    <div class="box blue"></div>
    <div class="box blue"></div>
    <div class="box blue"></div>
  </div>

</div>

</body>
</html>
