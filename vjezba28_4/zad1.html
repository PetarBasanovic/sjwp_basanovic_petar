<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zad4</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #ddd;
}

.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px;
}

.blue { background: gray; height: 70px; }

.box {
  width: 100%;
  height: 120px;
  text-align: center;
  font-size: 20px;
}

/* GRUPE - MOBILE (320px) */
.blue-group{
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* TABLET (>=768px) */
@media (min-width: 768px) {

  .blue-group {
    flex-direction: row;
    flex-wrap: wrap;
  }

  .blue-group .box {
    width: calc(50% - 5px);
    height: 200px;
  }

}

/* DESKTOP (>=1024px) */
@media (min-width: 1024px) {

  

  .blue-group {
    flex-direction: row;
  }

  .blue-group .box {
    width: calc(25% - 8px);
    height: 450px;
  }

}
</style>

</head>
<body>

<div class="container">



  <div class="blue-group">
      <div class="box blue">Proizvod1</div>
      <div class="box blue">Proizvod2</div>
      <div class="box blue">Proizvod3</div>
      <div class="box blue">Proizvod4</div>
      <div class="box blue">Proizvod5</div>
      <div class="box blue">Proizvod6</div>
      <div class="box blue">Proizvod7</div>
      <div class="box blue">Proizvod8</div>
  </div>

</div>

</body>
</html>
