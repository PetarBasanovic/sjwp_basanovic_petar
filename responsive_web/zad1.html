<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zad1</title>
</head>


<style>
    *{
    margin: 0;
    box-sizing: border-box;
}

body{
    color: #333;
    font-family: Arial, Helvetica, sans-serif;
}

.flex-container{
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    height: 100vh;
}

.flex-container > *, section {
    padding: 10px;
}



main {
    height: 80vh;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    flex: 0 100%;
}

.p{
    background-color: #da1f12;
    flex: 0 24%;
}
.d{
    background-color: #f1601d;
    flex: 0 24%;
}
.t{
    background-color: #eee555;
    flex: 0 24%;
}
.c{
    background-color: #21ee5f;
    flex: 0 24%;
}
    @media (max-width: 1023px) {
    section {
        background-color: pink;
        flex: 0 49%;
        height: 48%;
    }
    }
    @media (max-width:767px) {
    section:first-child, section:last-child {
        background-color: yellow;
        flex: 0 100%;
        height: 24%;
    }
    }
    @media (max-width:479px) {
    section{
        background-color: aquamarine;
        flex: 0 100%;
        height: 24%;
    }
    section:first-child, section:last-child{
        background-color: aquamarine;
    }
}

@media (orientation: landscape) and (max-width:479px){
    section{
        background-color: tomato;
    }
}
</style>


<body>
    <div class="flex-container">
        <main>
        <section class="p">1</section>
        <section class="d">2</section>
        <section class="t">3</section>
        <section class="c">4</section>
    </main>
    </div>
</body>
</html>
